<!DOCTYPE html>
<html>
<head>
    <title>Order Confirmed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('darkbrown background plain.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            width: 350px;
        }

        h1 {
            color: #5c2e0f;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            margin: 10px 0;
        }

        .details {
            text-align: left;
            margin-top: 15px;
            font-size: 15px;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            background: #8B4513;
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn:hover {
            background: #5c2e0f;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>✅ Thank You!</h1>
    <p>Your order has been confirmed.</p>

    <div class="details">
        <p><b>Order Details:</b></p>
        <p>Tracking id:63579276963</p>
        <p>Name: Customer Name</p>
        <p>Phone: 03XX-XXXXXXX</p>
        <p>Item: Cappuccino</p>
        <p>Quantity: 2</p>
        <p>Delivery Address: Your Address</p>
    </div>
<a href="index.html" class="btn">Back to Home</a> </div>

</body>
</html>
