<!DOCTYPE html>
<html>
<head>
    <title>Place Your Order</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('darkbrown background plain.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .order-form {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            background: #8B4513;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5c2e0f;
        }
    </style>
</head>
<body>

<div class="order-form">
    <h2>Place Your Order</h2>

        <label>Full Name</label>
        <input type="text" name="name"  placeholder="Enter your full name"  required>

        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="03XX-XXXXXXX" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="example@email.com">

        <label>Address</label>
        <textarea name="address" rows="3" placeholder="Enter your delivery address" required></textarea>

        <label>Select Item</label>
        <select name="item" required>
            <option value="">-- Choose Item --</option>
             <option disabled>HOT DRINKS</option>
            <option>Cappuccino-----RS150/-</option>
            <option>Brewewd Coffee----Rs100/-</option>
            <option>Caffe Mocha----Rs125/-</option>
            <option>Hot Choco----Rs140/-</option>
            <option>Mocha Blanco----Rs150/-</option>
              <option>Caffee Americano----Rs110/-</option>
            <option disabled>CHILLERA</option>
              <option>Iced Coffee----Rs105/-</option>
             <option>Iced Amerciano----Rs130/-</option>
             <option>Iced Choco----Rs160/-</option>
             <option>Iced Mocha----Rs150/-</option>
             <option>Iced Caffe Mocha----Rs145/-</option>
              <option>Iced Capuccino----Rs150/-</option>
              <option disabled>BLENDED</option>
               <option> Banana Caramel----Rs195/-</option>
               <option>Blended Caramel----Rs170/</option>
                <option>Hazel Nut----Rs175/-</option>
               <option>Java Chips----Rs180/-</option>


        </select>
         <label>Quantity</label>
    <input type="number" name="quantity" min="1" value="1" required>

   <button onclick="location.href='confirm order.html'" 
        style="width:100%; background:#8B4513; color:white; padding:12px; border-radius:5px; border:none; font-size:16px; cursor:pointer;">
    Confirm Order
</button>
</div>


</body>
</html>
